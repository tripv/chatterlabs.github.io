<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chatter Labs</title>

    <link rel="preload" href="/assets/fonts/chatter.woff2" as="font" type="font/woff2" crossorigin />

    <style>
      @font-face{
        font-family: "Chatter";
        src: url("/assets/fonts/chatter.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      body{
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        max-width: 760px;
        margin: 12vh auto;
        padding: 0 16px;
        line-height: 1.4;
      }

      .brand, .tagline{
        font-family: "Chatter", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      .brand{ font-size: 48px; margin: 0 0 12px; }
      .tagline{ font-size: 18px; margin: 0; opacity: 0.85; }
    </style>
  </head>

  <body>
    <h1 class="brand">Chatter Labs</h1>
    <p class="tagline">Chatter Labs builds AI models that bring the past to life and the future into focus.</p>
  </body>
</html>
